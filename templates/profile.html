{% extends 'base.html' %}
{% block title %} Profile {% endblock %}
{% block body %}
    <h2>Welcome, {{ username }}!</h2>
    <h3>Saved Recipes:</h3>
    <ul>
        {% for recipe in saved_recipes %}
            <li><a href="{{ url_for('recipe_details', recipe_id=recipe['recipe_id']) }}">{{ recipe['title'] }}</a></li>
        {% endfor %}
    </ul>
{% endblock %}
