<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes Search</title>
    <!-- Add your stylesheets or any other necessary head content here -->
    <style>
        /* Add custom styles here if needed */
        .recipe-container {
            display: flex;
            flex-direction: column; /* Stack items vertically */
            align-items: center; /* Center items horizontally */
            margin-bottom: 20px;
        }

        .recipe-image {
            width: 30%;
            height: auto;
            margin-bottom: 10px; /* Spacing between image and title */
        }

        .recipe-title {
            font-size: 20px;
            text-align: center; /* Center the title */
        }
    </style>
</head>
{% extends 'base.html' %}
{% block title %} Recipes Search {% endblock %}
{% block body %}
    <h2 style="text-align: center"><a href="/" style="text-decoration: none; color:#87d591">Recipes for you:</a></h2>
    <div>
        {% for recipe in recipes %}
            <div class="recipe-container">
                <img src="{{ recipe['image'] }}" class="recipe-image" alt="Recipe Image">
                <h3 class="recipe-title"><a href="{{ url_for('recipe_details', recipe_id=recipe['id']) }}">{{ recipe['title'] }}</a></h3>
                <!-- Add more details as needed -->
            </div>
        {% endfor %}
    </div>
{% endblock %}
</html>
